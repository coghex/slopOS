[package]
name = "zlib"
version = "1.3.2"
release = 1
summary = "Compression library"
description = "General-purpose lossless compression library."
license = "Zlib"
homepage = "https://zlib.net"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://www.zlib.net/zlib-1.3.2.tar.xz"
sha256 = "d7a0654783a4da529d1bb793b7ad9c3318020af77667bcae35f95d0e42a792f3"
strip_components = 1

[build]
system = "gnu"
out_of_tree = false
configure = ["--prefix=/usr/local"]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]
