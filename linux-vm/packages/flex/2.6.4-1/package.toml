[package]
name = "flex"
version = "2.6.4"
release = 1
summary = "Fast lexical analyzer generator"
description = "Scanner generator used by parser and compiler toolchains."
license = "FLEX"
homepage = "https://github.com/westes/flex"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://github.com/westes/flex/files/981163/flex-2.6.4.tar.gz"
sha256 = "e87aae032bf07c26f85ac0ed3250998c37621d95f8bd748b31f15b33c45ee995"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = ["--prefix=/usr/local", "--disable-doc"]

[build.env]
ac_cv_path_M4 = "/usr/local/bin/m4"
ac_cv_func_reallocarray = "no"

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "m4"
constraint = ">= 1.4.21-1"
kind = "runtime"

[[dependencies]]
name = "m4"
constraint = ">= 1.4.21-1"
kind = "build"
