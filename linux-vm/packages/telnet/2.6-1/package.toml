[package]
name = "telnet"
version = "2.6"
release = 1
summary = "GNU telnet client"
description = "Managed telnet client built from GNU inetutils so the guest no longer depends on the BusyBox telnet applet."
license = "GPL-3.0+, GFDL-1.3+"
homepage = "https://www.gnu.org/software/inetutils/"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://ftpmirror.gnu.org/inetutils/inetutils-2.6.tar.xz"
sha256 = "68bedbfeaf73f7d86be2a7d99bcfbd4093d829f52770893919ae174c0b2357ca"
strip_components = 1

[[sources]]
kind = "file"
url = "build.sh"
sha256 = "local"
destination = "support/build.sh"

[build]
system = "custom"
out_of_tree = true
install = ["bash \"$PKG_SOURCE_DIR/support/build.sh\""]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "ncurses"
constraint = ">= 6.6-20251231-1"
kind = "runtime"

[[dependencies]]
name = "readline"
constraint = ">= 8.3-1"
kind = "runtime"

[[dependencies]]
name = "ncurses"
constraint = ">= 6.6-20251231-1"
kind = "build"

[[dependencies]]
name = "readline"
constraint = ">= 8.3-1"
kind = "build"
