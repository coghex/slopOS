[package]
name = "selfhost-devel"
version = "0.1.0"
release = 1
summary = "Managed self-host development world package"
description = "Meta package for the canonical development tool stack used to build packages and software inside the guest."
license = "MIT"
architectures = ["aarch64"]

[build]
system = "custom"
out_of_tree = true

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "autoconf"
constraint = ">= 2.72-1"
kind = "runtime"

[[dependencies]]
name = "automake"
constraint = ">= 1.16.5-1"
kind = "runtime"

[[dependencies]]
name = "bison"
constraint = ">= 3.8.2-1"
kind = "runtime"

[[dependencies]]
name = "cmake"
constraint = ">= 4.2.3-1"
kind = "runtime"

[[dependencies]]
name = "file"
constraint = ">= 5.47-1"
kind = "runtime"

[[dependencies]]
name = "flex"
constraint = ">= 2.6.4-1"
kind = "runtime"

[[dependencies]]
name = "libtool"
constraint = ">= 2.4.6-1"
kind = "runtime"

[[dependencies]]
name = "m4"
constraint = ">= 1.4.21-1"
kind = "runtime"

[[dependencies]]
name = "make"
constraint = ">= 4.4.1-1"
kind = "runtime"

[[dependencies]]
name = "meson"
constraint = ">= 1.10.1-1"
kind = "runtime"

[[dependencies]]
name = "ninja"
constraint = ">= 1.13.2-1"
kind = "runtime"

[[dependencies]]
name = "perl"
constraint = ">= 5.42.0-1"
kind = "runtime"

[[dependencies]]
name = "which"
constraint = ">= 2.23-1"
kind = "runtime"
