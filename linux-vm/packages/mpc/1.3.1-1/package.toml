[package]
name = "mpc"
version = "1.3.1"
release = 1
summary = "GNU multiple precision complex arithmetic library"
description = "Complex arithmetic library used by GCC."
license = "LGPL-3.0-or-later"
homepage = "https://www.multiprecision.org/mpc/"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://ftp.gnu.org/gnu/mpc/mpc-1.3.1.tar.gz"
filename = "mpc-1.3.1.tar.gz"
sha256 = "ab642492f5cf882b74aa0cb730cd410a81edcdbec895183ce930e706c1c759b8"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = [
  "--with-gmp=/usr/local",
  "--with-mpfr=/usr/local",
]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "gmp"
constraint = ">= 6.3.0-1"
kind = "runtime"

[[dependencies]]
name = "mpfr"
constraint = ">= 4.2.1-1"
kind = "runtime"

[[dependencies]]
name = "gmp"
constraint = ">= 6.3.0-1"
kind = "build"

[[dependencies]]
name = "mpfr"
constraint = ">= 4.2.1-1"
kind = "build"
