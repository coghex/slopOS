[package]
name = "curl"
version = "8.19.0"
release = 1
summary = "Data transfer tool and library"
description = "Command-line data transfer tool and libcurl built against OpenSSL."
license = "curl"
homepage = "https://curl.se"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://curl.se/download/curl-8.19.0.tar.xz"
sha256 = "4eb41489790d19e190d7ac7e18e82857cdd68af8f4e66b292ced562d333f11df"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = [
  "--prefix=/usr/local",
  "--disable-manual",
  "--disable-ntlm",
  "--disable-curldebug",
  "--disable-libcurl-option",
  "--disable-ldap",
  "--disable-ldaps",
  "--enable-threaded-resolver",
  "--with-openssl=/usr/local",
  "--with-zlib=/usr/local",
  "--with-ca-path=/etc/ssl/certs",
  "--with-ca-bundle=/etc/ssl/certs/ca-certificates.crt",
  "--without-gnutls",
  "--without-mbedtls",
  "--without-wolfssl",
  "--disable-ares",
  "--without-libidn2",
  "--without-libpsl",
  "--without-libssh2",
  "--without-brotli",
  "--without-nghttp2",
  "--without-libgsasl",
  "--enable-cookies",
  "--enable-proxy",
  "--disable-websockets",
  "--disable-dict",
  "--disable-gopher",
  "--disable-imap",
  "--disable-pop3",
  "--disable-rtsp",
  "--disable-smb",
  "--disable-smtp",
  "--disable-telnet",
  "--disable-tftp",
]

[build.env]
CPPFLAGS = "-I/usr/local/include"
LDFLAGS = "-L/usr/local/lib"
LD_LIBRARY_PATH = "/usr/local/lib"
PKG_CONFIG_PATH = "/usr/local/lib/pkgconfig"

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "zlib"
constraint = ">= 1.3.2-1"
kind = "runtime"

[[dependencies]]
name = "openssl"
constraint = ">= 3.6.1-1"
kind = "runtime"

[[dependencies]]
name = "zlib"
constraint = ">= 1.3.2-1"
kind = "build"

[[dependencies]]
name = "openssl"
constraint = ">= 3.6.1-1"
kind = "build"
