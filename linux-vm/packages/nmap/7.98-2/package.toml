[package]
name = "nmap"
version = "7.98"
release = 2
summary = "Network mapper and scanner"
description = "Managed nmap build for host discovery and port scanning without relying on the seed image."
license = "Nmap Public Source License"
homepage = "https://nmap.org/"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://nmap.org/dist/nmap-7.98.tar.bz2"
sha256 = "ce847313eaae9e5c9f21708e42d2ab7b56c7e0eb8803729a3092f58886d897e6"
strip_components = 1

[[sources]]
kind = "file"
url = "build.sh"
sha256 = "local"
destination = "support/build.sh"

[build]
system = "custom"
out_of_tree = false
install = ["bash \"$PKG_SOURCE_DIR/support/build.sh\""]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "liblinear"
constraint = ">= 2.49-1"
kind = "runtime"

[[dependencies]]
name = "libpcap"
constraint = ">= 1.10.5-1"
kind = "runtime"

[[dependencies]]
name = "openssl"
constraint = ">= 3.6.1-1"
kind = "runtime"

[[dependencies]]
name = "pcre2"
constraint = ">= 10.47-3"
kind = "runtime"

[[dependencies]]
name = "zlib"
constraint = ">= 1.3.2-1"
kind = "runtime"

[[dependencies]]
name = "liblinear"
constraint = ">= 2.49-1"
kind = "build"

[[dependencies]]
name = "libpcap"
constraint = ">= 1.10.5-1"
kind = "build"

[[dependencies]]
name = "openssl"
constraint = ">= 3.6.1-1"
kind = "build"

[[dependencies]]
name = "pcre2"
constraint = ">= 10.47-3"
kind = "build"

[[dependencies]]
name = "zlib"
constraint = ">= 1.3.2-1"
kind = "build"

[[dependencies]]
name = "pkgconf"
constraint = ">= 2.3.0-1"
kind = "build"
