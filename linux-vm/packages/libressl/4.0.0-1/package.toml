[package]
name = "libressl"
version = "4.0.0"
release = 1
summary = "Alternative TLS toolkit"
description = "Alternative TLS provider implementation."
license = "ISC"
homepage = "https://libressl.org"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://ftp.openbsd.org/pub/OpenBSD/LibreSSL/libressl-4.0.0.tar.gz"
sha256 = "3333333333333333333333333333333333333333333333333333333333333333"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = ["--prefix=/usr/local"]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[provides]]
name = "tls-provider"
constraint = ">= 1-0"
