[package]
name = "meson"
version = "1.10.1"
release = 1
summary = "Meson build system"
description = "Python-based modern build system that commonly drives Ninja builds."
license = "Apache-2.0"
homepage = "https://mesonbuild.com"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://github.com/mesonbuild/meson/releases/download/1.10.1/meson-1.10.1.tar.gz"
sha256 = "c42296f12db316a4515b9375a5df330f2e751ccdd4f608430d41d7d6210e4317"
strip_components = 1

[[sources]]
kind = "file"
url = "install.sh"
sha256 = "local"
destination = "support/install.sh"

[build]
system = "custom"
out_of_tree = false
install = ["bash \"$PKG_SOURCE_DIR/support/install.sh\""]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "ninja"
constraint = ">= 1.13.2-1"
kind = "runtime"
