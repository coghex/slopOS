[package]
name = "mpfr"
version = "4.2.1"
release = 1
summary = "GNU multiple precision floating-point library"
description = "Floating-point arithmetic library used by GCC and MPC."
license = "LGPL-3.0-or-later"
homepage = "https://www.mpfr.org/"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://www.mpfr.org/mpfr-4.2.1/mpfr-4.2.1.tar.xz"
filename = "mpfr-4.2.1.tar.xz"
sha256 = "277807353a6726978996945af13e52829e3abd7a9a5b7fb2793894e18f1fcbb2"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = [
  "--with-gmp=/usr/local",
]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "gmp"
constraint = ">= 6.3.0-1"
kind = "runtime"

[[dependencies]]
name = "gmp"
constraint = ">= 6.3.0-1"
kind = "build"
