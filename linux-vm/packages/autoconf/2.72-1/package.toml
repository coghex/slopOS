[package]
name = "autoconf"
version = "2.72"
release = 1
summary = "GNU Autoconf"
description = "Autoconf and autoreconf tools for generating configure scripts from Autotools metadata."
license = "GPL-3.0+ with exceptions"
homepage = "https://www.gnu.org/software/autoconf/"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://ftp.gnu.org/gnu/autoconf/autoconf-2.72.tar.xz"
sha256 = "ba885c1319578d6c94d46e9b0dceb4014caafe2490e437a0dbca3f270a223f5a"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = ["--prefix=/usr/local"]

[build.env]
EMACS = "no"
ac_cv_path_M4 = "/usr/local/bin/m4"
ac_cv_prog_gnu_m4_gnu = "no"

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "m4"
constraint = ">= 1.4.21-1"
kind = "runtime"

[[dependencies]]
name = "m4"
constraint = ">= 1.4.21-1"
kind = "build"

[[dependencies]]
name = "libtool"
constraint = ">= 2.4.6-1"
kind = "build"
