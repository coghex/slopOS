[package]
name = "file"
version = "5.47"
release = 1
summary = "File type identification tool and libmagic"
description = "Managed file(1) and libmagic so source-build workflows no longer depend on the seeded base image copy."
license = "BSD-2-Clause, BSD-3-Clause"
homepage = "https://astron.com/pub/file/"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://astron.com/pub/file/file-5.47.tar.gz"
sha256 = "45672fec165cb4cc1358a2d76b5d57d22876dcb97ab169427ac385cbe1d5597a"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = [
  "--prefix=/usr/local",
  "--disable-bzlib",
  "--disable-libseccomp",
  "--enable-zlib",
  "--enable-xzlib",
]

[build.env]
ac_cv_prog_cc_c99 = "-std=gnu99"
CPPFLAGS = "-I/usr/local/include"
LDFLAGS = "-L/usr/local/lib"
PKG_CONFIG_PATH = "/usr/local/lib/pkgconfig"

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "zlib"
constraint = ">= 1.3.2-1"
kind = "runtime"

[[dependencies]]
name = "xz"
constraint = ">= 5.8.2-1"
kind = "runtime"

[[dependencies]]
name = "zlib"
constraint = ">= 1.3.2-1"
kind = "build"

[[dependencies]]
name = "xz"
constraint = ">= 5.8.2-1"
kind = "build"
