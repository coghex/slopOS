[package]
name = "selfhost-base"
version = "0.1.0"
release = 1
summary = "Managed self-host base world package"
description = "Meta package for the canonical post-reseed base system: package manager, SSH access, shell/runtime replacements, and the core /usr/local userland."
license = "MIT"
architectures = ["aarch64"]

[build]
system = "custom"
out_of_tree = true

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "bash"
constraint = ">= 5.2.37-1"
kind = "runtime"

[[dependencies]]
name = "coreutils"
constraint = ">= 9.10-1"
kind = "runtime"

[[dependencies]]
name = "curl"
constraint = ">= 8.19.0-1"
kind = "runtime"

[[dependencies]]
name = "dash"
constraint = ">= 0.5.13.1-1"
kind = "runtime"

[[dependencies]]
name = "diffutils"
constraint = ">= 3.12-1"
kind = "runtime"

[[dependencies]]
name = "dropbear"
constraint = ">= 2025.89-1"
kind = "runtime"

[[dependencies]]
name = "expat"
constraint = ">= 2.7.5-1"
kind = "runtime"

[[dependencies]]
name = "findutils"
constraint = ">= 4.10.0-1"
kind = "runtime"

[[dependencies]]
name = "gawk"
constraint = ">= 5.4.0-1"
kind = "runtime"

[[dependencies]]
name = "grep"
constraint = ">= 3.12-1"
kind = "runtime"

[[dependencies]]
name = "gzip"
constraint = ">= 1.14-1"
kind = "runtime"

[[dependencies]]
name = "less"
constraint = ">= 692-1"
kind = "runtime"

[[dependencies]]
name = "libffi"
constraint = ">= 3.4.8-1"
kind = "runtime"

[[dependencies]]
name = "nano"
constraint = ">= 8.7.1-1"
kind = "runtime"

[[dependencies]]
name = "ncurses"
constraint = ">= 6.6-20251231-1"
kind = "runtime"

[[dependencies]]
name = "openssl"
constraint = ">= 3.6.1-1"
kind = "runtime"

[[dependencies]]
name = "patch"
constraint = ">= 2.7.6-1"
kind = "runtime"

[[dependencies]]
name = "pkgconf"
constraint = ">= 2.3.0-1"
kind = "runtime"

[[dependencies]]
name = "readline"
constraint = ">= 8.3-1"
kind = "runtime"

[[dependencies]]
name = "sed"
constraint = ">= 4.9-1"
kind = "runtime"

[[dependencies]]
name = "sloppkg"
constraint = ">= 0.1.0-1"
kind = "runtime"

[[dependencies]]
name = "sqlite"
constraint = ">= 3.51.3-1"
kind = "runtime"

[[dependencies]]
name = "tar"
