[package]
name = "readline"
version = "8.3"
release = 1
summary = "GNU command-line editing library"
description = "Interactive line-editing and history library built against ncurses."
license = "GPL-3.0-or-later"
homepage = "https://tiswww.case.edu/php/chet/readline/rltop.html"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://ftp.gnu.org/gnu/readline/readline-8.3.tar.gz"
sha256 = "fe5383204467828cd495ee8d1d3c037a7eba1389c22bc6a041f627976f9061cc"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = [
  "--prefix=/usr/local",
  "--disable-install-examples",
  "--with-curses",
  "--with-shared-termcap-library",
  "--enable-bracketed-paste-default",
]

[build.env]
bash_cv_func_sigsetjmp = "yes"
bash_cv_wcwidth_broken = "no"
CPPFLAGS = "-I/usr/local/include"
LDFLAGS = "-L/usr/local/lib"
PKG_CONFIG_PATH = "/usr/local/lib/pkgconfig"

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "ncurses"
constraint = ">= 6.6-20251231-1"
kind = "runtime"

[[dependencies]]
name = "ncurses"
constraint = ">= 6.6-20251231-1"
kind = "build"
