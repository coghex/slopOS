[package]
name = "binutils"
version = "2.45"
release = 1
summary = "GNU assembler, linker, and binary utilities"
description = "Native linker and binary utilities used to bootstrap the self-hosted toolchain."
license = "GPL-3.0-or-later"
homepage = "https://www.gnu.org/software/binutils/"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://ftp.gnu.org/gnu/binutils/binutils-2.45.tar.xz"
filename = "binutils-2.45.tar.xz"
sha256 = "c50c0e7f9cb188980e2cc97e4537626b1672441815587f1eab69d2a1bfbef5d2"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = [
  "--disable-nls",
  "--disable-werror",
]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]
