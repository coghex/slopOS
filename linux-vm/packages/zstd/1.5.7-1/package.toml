[package]
name = "zstd"
version = "1.5.7"
release = 1
summary = "Zstandard compression tools and libraries"
description = "Fast compression library and command-line tools with zlib and xz support enabled."
license = "BSD-3-Clause, GPL-2.0-only"
homepage = "https://github.com/facebook/zstd"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-1.5.7.tar.gz"
sha256 = "eb33e51f49a15e023950cd7825ca74a4a2b43db8354825ac24fc1b7ee09e6fa3"
strip_components = 1

[[sources]]
kind = "file"
url = "build.sh"
sha256 = "local"
destination = "support/build.sh"

[build]
system = "custom"
out_of_tree = false
install = ["bash \"$PKG_SOURCE_DIR/support/build.sh\""]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "zlib"
constraint = ">= 1.3.2-1"
kind = "runtime"

[[dependencies]]
name = "xz"
constraint = ">= 5.8.2-1"
kind = "runtime"

[[dependencies]]
name = "zlib"
constraint = ">= 1.3.2-1"
kind = "build"

[[dependencies]]
name = "xz"
constraint = ">= 5.8.2-1"
kind = "build"
