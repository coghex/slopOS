[package]
name = "openssl"
version = "3.6.1"
release = 1
summary = "TLS toolkit"
description = "TLS and cryptography toolkit with libcrypto, libssl, and the openssl CLI."
license = "Apache-2.0"
homepage = "https://openssl.org"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://github.com/openssl/openssl/releases/download/openssl-3.6.1/openssl-3.6.1.tar.gz"
sha256 = "b1bfedcd5b289ff22aee87c9d600f515767ebf45f77168cb6d64f231f518a82e"
strip_components = 1

[build]
system = "custom"
out_of_tree = false
build = [
  "./Configure linux-aarch64 --prefix=\"$PREFIX\" --openssldir=\"$PREFIX/etc/ssl\" shared no-docs no-tests no-fuzz-libfuzzer no-fuzz-afl"
]
install = [
  "make -j\"$BUILD_JOBS\"",
  "make DESTDIR=\"$PKG_DESTDIR\" install_sw install_ssldirs"
]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[provides]]
name = "tls-provider"
constraint = ">= 1-0"
