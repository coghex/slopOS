[package]
name = "bison"
version = "3.8.2"
release = 1
summary = "GNU parser generator"
description = "Parser generator that turns grammar descriptions into C parsers."
license = "GPL-3.0+"
homepage = "https://www.gnu.org/software/bison/"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://ftp.gnu.org/gnu/bison/bison-3.8.2.tar.xz"
sha256 = "9bba0214ccf7f1079c5d59210045227bcf619519840ebfa80cd3849cff5a5bf2"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = ["--prefix=/usr/local", "--enable-relocatable"]
jobs = 1

[build.env]
ac_cv_libtextstyle = "no"

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "m4"
constraint = ">= 1.4.21-1"
kind = "runtime"

[[dependencies]]
name = "m4"
constraint = ">= 1.4.21-1"
kind = "build"
