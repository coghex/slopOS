[package]
name = "gawk"
version = "5.4.0"
release = 1
summary = "GNU awk"
description = "Pattern scanning and reporting language for package builds, scripts, and text processing."
license = "GPL-3.0+"
homepage = "https://www.gnu.org/software/gawk/"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://ftp.gnu.org/gnu/gawk/gawk-5.4.0.tar.xz"
sha256 = "3dd430f0cd3b4428c6c3f6afc021b9cd3c1f8c93f7a688dc268ca428a90b4ac1"
strip_components = 1

[[sources]]
kind = "file"
url = "build.sh"
sha256 = "local"
destination = "support/build.sh"

[build]
system = "custom"
out_of_tree = true
install = [
  "bash \"$PKG_SOURCE_DIR/support/build.sh\""
]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]
