[package]
name = "netcat"
version = "0.7.1"
release = 1
summary = "TCP and UDP debugging utility"
description = "Managed netcat implementation providing the nc command for day-to-day network diagnostics and scripting."
license = "GPL-2.0+"
homepage = "https://netcat.sourceforge.net"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://downloads.sourceforge.net/project/netcat/netcat/0.7.1/netcat-0.7.1.tar.gz"
sha256 = "30719c9a4ffbcf15676b8f528233ccc54ee6cba96cb4590975f5fd60c68a066f"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = [
  "--prefix=/usr/local",
  "--build=aarch64-unknown-linux-gnu",
  "--host=aarch64-unknown-linux-gnu",
]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]
