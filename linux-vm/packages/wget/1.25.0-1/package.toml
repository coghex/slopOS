[package]
name = "wget"
version = "1.25.0"
release = 1
summary = "Non-interactive network downloader"
description = "Managed Wget build so the guest no longer depends on the seeded base-image downloader."
license = "GPL-3.0+"
homepage = "https://www.gnu.org/software/wget/"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://ftpmirror.gnu.org/wget/wget-1.25.0.tar.gz"
sha256 = "766e48423e79359ea31e41db9e5c289675947a7fcf2efdcedb726ac9d0da3784"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = [
  "--prefix=/usr/local",
  "--with-ssl=openssl",
  "--without-libpsl",
  "--disable-iri",
  "--without-libuuid",
  "--with-zlib",
  "--without-cares",
  "--disable-pcre",
  "--disable-pcre2",
]

[build.env]
CPPFLAGS = "-I/usr/local/include"
LDFLAGS = "-L/usr/local/lib"
PKG_CONFIG_PATH = "/usr/local/lib/pkgconfig"

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "zlib"
constraint = ">= 1.3.2-1"
kind = "runtime"

[[dependencies]]
name = "openssl"
constraint = ">= 3.6.1-1"
kind = "runtime"

[[dependencies]]
name = "zlib"
constraint = ">= 1.3.2-1"
kind = "build"

[[dependencies]]
name = "openssl"
constraint = ">= 3.6.1-1"
kind = "build"
