[package]
name = "bash"
version = "5.2.37"
release = 1
summary = "GNU Bourne Again shell"
description = "Managed interactive shell so day-to-day guest use can prefer the package-managed shell stack under /usr/local."
license = "GPL-3.0+"
homepage = "https://www.gnu.org/software/bash/"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://ftpmirror.gnu.org/bash/bash-5.2.37.tar.gz"
sha256 = "9599b22ecd1d5787ad7d3b7bf0c59f312b3396d1e281175dd1f8a4014da621ff"
strip_components = 1

[build]
system = "gnu"
out_of_tree = true
configure = [
  "--prefix=/usr/local",
  "--with-installed-readline",
  "--without-bash-malloc",
  "--disable-nls",
]

[build.env]
CPPFLAGS = "-I/usr/local/include"
LDFLAGS = "-L/usr/local/lib"
PKG_CONFIG_PATH = "/usr/local/lib/pkgconfig"
ac_cv_rl_prefix = "/usr/local"
ac_cv_rl_version = "8.3"
bash_cv_getcwd_malloc = "yes"
bash_cv_job_control_missing = "present"
bash_cv_sys_named_pipes = "present"
bash_cv_func_sigsetjmp = "present"
bash_cv_printf_a_format = "yes"

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "ncurses"
constraint = ">= 6.6-20251231-1"
kind = "runtime"

[[dependencies]]
name = "readline"
constraint = ">= 8.3-1"
kind = "runtime"

[[dependencies]]
name = "ncurses"
constraint = ">= 6.6-20251231-1"
kind = "build"

[[dependencies]]
name = "readline"
constraint = ">= 8.3-1"
kind = "build"
