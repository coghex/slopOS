[package]
name = "libtool"
version = "2.4.6"
release = 1
summary = "GNU libtool and libtoolize"
description = "Shared-library build helpers and libtoolize support for Autotools-based projects."
license = "GPL-2.0+ (libtool), LGPL-2.1+ (libltdl)"
homepage = "https://www.gnu.org/software/libtool/"
architectures = ["aarch64"]

[[sources]]
kind = "archive"
url = "https://ftp.gnu.org/gnu/libtool/libtool-2.4.6.tar.xz"
sha256 = "7c87a8c2c8c0fc9cd5019e402bed4292462d00a718a7cd5f11218153bf28b26f"
strip_components = 1

[[sources]]
kind = "file"
url = "build.sh"
sha256 = "local"
destination = "support/build.sh"

[build]
system = "custom"
out_of_tree = true
install = [
  "bash \"$PKG_SOURCE_DIR/support/build.sh\""
]

[build.env]
MAKEINFO = "true"

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]

[[dependencies]]
name = "m4"
constraint = ">= 1.4.21-1"
kind = "runtime"

[[dependencies]]
name = "m4"
constraint = ">= 1.4.21-1"
kind = "build"
