[package]
name = "hello-stage"
version = "0.1.0"
release = 1
summary = "Offline staging demo package"
description = "Small local package used to exercise sloppkg build staging and manifest generation."
license = "MIT"
architectures = ["aarch64"]

[[sources]]
kind = "file"
url = "payload"
sha256 = "local"
destination = "payload"

[build]
system = "custom"
out_of_tree = true
directory = "payload"
install = [
  "mkdir -p \"$PKG_DESTDIR/usr/local/bin\"",
  "install -m 0755 \"$PKG_SOURCE_DIR/hello-stage.sh\" \"$PKG_DESTDIR/usr/local/bin/hello-stage\"",
  "mkdir -p \"$PKG_DESTDIR/usr/local/share/hello-stage\"",
  "install -m 0644 \"$PKG_SOURCE_DIR/message.txt\" \"$PKG_DESTDIR/usr/local/share/hello-stage/message.txt\""
]

[install]
prefix = "/usr/local"
owned_prefixes = ["/usr/local"]
